  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,body{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
    }

    body{
      font-family:'Inter',system-ui,sans-serif;
      background:
        radial-gradient(circle at top left, #16332a 0%, transparent 35%),
        radial-gradient(circle at bottom right, #0f3d46 0%, transparent 35%),
        linear-gradient(135deg, #041411 0%, #071d1a 45%, #020808 100%);
      color:#ffffff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      text-align:center;
      padding:24px;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(0,255,180,0.03) 0px,
          rgba(0,255,180,0.03) 1px,
          transparent 1px,
          transparent 60px
        );
      pointer-events:none;
    }

    .wrapper{
      width:100%;
      max-width:400px;
      padding:34px 26px;
      border-radius:28px;
      background:rgba(8,20,18,0.72);
      border:1px solid rgba(0,255,180,0.12);
      backdrop-filter:blur(12px);
      box-shadow:
        0 0 40px rgba(0,255,180,0.08),
        0 20px 60px rgba(0,0,0,0.45);
    }

    .logo{
      font-size:2.15rem;
      font-weight:800;
      margin-bottom:16px;
      letter-spacing:1px;
      background:linear-gradient(90deg,#00ffae,#62ffe3,#9effc9);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      text-shadow:0 0 22px rgba(0,255,180,0.18);
    }

    .subtitle{
      font-size:1.05rem;
      line-height:1.7;
      color:#a7d8ca;
      margin-bottom:36px;
      font-weight:500;
    }

    .btn{
      position:relative;
      overflow:hidden;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
      text-decoration:none;
      background:linear-gradient(90deg,#00d48f,#00ffbf);
      color:#041411;
      font-weight:800;
      font-size:1.08rem;
      padding:18px 24px;
      border-radius:18px;
      letter-spacing:0.5px;
      box-shadow:
        0 10px 35px rgba(0,255,180,0.25),
        inset 0 1px 0 rgba(255,255,255,0.25);
      transition:
        transform .15s ease,
        box-shadow .2s ease,
        opacity .15s ease;
    }

    .btn::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:70%;
      height:100%;
      background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.28),
        transparent
      );
      transition:left .55s ease;
    }

    .btn:hover::before{
      left:130%;
    }

    .btn:hover{
      box-shadow:
        0 14px 42px rgba(0,255,180,0.38),
        inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .btn:active{
      transform:scale(.98);
      opacity:.94;
    }

    .footer{
      margin-top:28px;
      font-size:.75rem;
      color:#5f8b80;
      font-weight:500;
      letter-spacing:0.4px;
    }

    @media (max-width:480px){
      .wrapper{
        padding:30px 22px;
        border-radius:24px;
      }

      .logo{
        font-size:1.95rem;
      }

      .subtitle{
        font-size:1rem;
      }

      .btn{
        font-size:1rem;
        padding:17px 20px;
      }
    }
  </style>
